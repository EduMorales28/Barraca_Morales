name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "URL publica del backend (ej: https://api.tudominio.com)"
        required: true
        default: "http://localhost:3000"
  push:
    tags:
      - "v*"

env:
  API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'http://localhost:3000' }}

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK release (live API)
        shell: bash
        run: |
          API_BASE_URL_CLEAN="$(echo "${{ env.API_BASE_URL }}" | sed -E 's/^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=[[:space:]]*//' | xargs)"
          echo "Using API_BASE_URL=$API_BASE_URL_CLEAN"
          flutter build apk --release --dart-define=API_BASE_URL="$API_BASE_URL_CLEAN"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

  windows-exe:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Patch Windows generated plugins (exclude Firebase)
        shell: pwsh
        run: |
          @'
          #
          # Generated file, do not edit.
          #

          list(APPEND FLUTTER_PLUGIN_LIST
            geolocator_windows
          )

          list(APPEND FLUTTER_FFI_PLUGIN_LIST
          )

          set(PLUGIN_BUNDLED_LIBRARIES)

          foreach(plugin ${FLUTTER_PLUGIN_LIST})
            add_subdirectory(flutter/ephemeral/.plugin_symlinks/${plugin}/windows plugins/${plugin})
            target_link_libraries(${BINARY_NAME} PRIVATE ${plugin}_plugin)
            list(APPEND PLUGIN_BUNDLED_LIBRARIES $<TARGET_FILE:${plugin}_plugin>)
            list(APPEND PLUGIN_BUNDLED_LIBRARIES ${${plugin}_bundled_libraries})
          endforeach(plugin)

          foreach(ffi_plugin ${FLUTTER_FFI_PLUGIN_LIST})
            add_subdirectory(flutter/ephemeral/.plugin_symlinks/${ffi_plugin}/windows plugins/${ffi_plugin})
            list(APPEND PLUGIN_BUNDLED_LIBRARIES ${${ffi_plugin}_bundled_libraries})
          endforeach(ffi_plugin)
          '@ | Set-Content windows/flutter/generated_plugins.cmake

          @'
          //
          //  Generated file. Do not edit.
          //

          // clang-format off

          #include "generated_plugin_registrant.h"

          #include <geolocator_windows/geolocator_windows.h>

          void RegisterPlugins(flutter::PluginRegistry* registry) {
            GeolocatorWindowsRegisterWithRegistrar(
                registry->GetRegistrarForPlugin("GeolocatorWindows"));
          }
          '@ | Set-Content windows/flutter/generated_plugin_registrant.cc

      - name: Build Windows release (live API)
        shell: bash
        run: |
          API_BASE_URL_CLEAN="$(echo "${{ env.API_BASE_URL }}" | sed -E 's/^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=[[:space:]]*//' | xargs)"
          echo "Using API_BASE_URL=$API_BASE_URL_CLEAN"
          flutter build windows --release --dart-define=API_BASE_URL="$API_BASE_URL_CLEAN"

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/logistica_morales-windows-release.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-release
          path: build/windows/logistica_morales-windows-release.zip

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-file
          path: build/windows/x64/runner/Release/logistica_morales.exe

  macos-dmg:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS release (live API)
        shell: bash
        run: |
          API_BASE_URL_CLEAN="$(echo "${{ env.API_BASE_URL }}" | sed -E 's/^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=[[:space:]]*//' | xargs)"
          echo "Using API_BASE_URL=$API_BASE_URL_CLEAN"
          flutter build macos --release --dart-define=API_BASE_URL="$API_BASE_URL_CLEAN"

      - name: Create DMG
        run: |
          mkdir -p dist/macos
          hdiutil create -volname "LogisticaMorales" -srcfolder build/macos/Build/Products/Release/logistica_morales.app -ov -format UDZO dist/macos/logistica_morales-macos-release.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-release
          path: dist/macos/logistica_morales-macos-release.dmg
